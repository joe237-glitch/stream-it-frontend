<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#050400"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B90B"/>
      <stop offset="100%" stop-color="#d4a009"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Top bar -->
  <rect width="400" height="5" fill="#F0B90B"/>
  <!-- Watermark letter (large, low opacity) -->
  <text x="200" y="240" font-family="Arial Black,sans-serif" font-size="220" font-weight="900" fill="#F0B90B" opacity="0.06" text-anchor="middle">B</text>
  <!-- Service name -->
  <text x="200" y="175" font-family="Arial Black,sans-serif" font-size="48" font-weight="900" fill="#F0B90B" text-anchor="middle" letter-spacing="3">BINANCE</text>
  <!-- Sub text -->
  <text x="200" y="210" font-family="Arial,sans-serif" font-size="18" fill="#ffffff" opacity="0.5" text-anchor="middle" letter-spacing="4">GIFT CARD</text>
  <!-- Divider -->
  <rect x="130" y="228" width="140" height="1" fill="#F0B90B" opacity="0.4"/>
  <!-- Pill background -->
  <rect x="80" y="250" width="240" height="60" rx="30" fill="url(#pill)"/>
  <!-- Pill text -->
  <text x="200" y="290" font-family="Arial Black,sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle">USDT VARIABLE</text>
  <!-- Bottom bar -->
  <rect y="395" width="400" height="5" fill="#F0B90B"/>
</svg>
